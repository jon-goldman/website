<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>live system log</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #F1ECE1;
    --ink: #1F1C18;
    --soft: #79736A;
    --riso: #234E70;
    --rule: #D6CFC1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: transparent;
    color: var(--ink);
    font-family: "Courier Prime", monospace;
    -webkit-font-smoothing: antialiased;
  }
  .log {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px clamp(20px, 6vw, 40px) 34px;
  }

  /* header */
  .head { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
  .head svg { width: 13px; height: 13px; color: var(--riso); flex: none; }
  .head .title {
    font-size: 12.5px; letter-spacing: 0.14em; text-transform: none; color: var(--soft);
  }
  .head .live {
    margin-left: auto; display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; letter-spacing: 0.08em; color: var(--soft);
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--riso);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

  .rule { height: 1px; background: var(--ink); margin: 12px 0 2px; }

  /* rows */
  ul { list-style: none; margin: 0; padding: 0; }
  li {
    padding: 11px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 13px;
    line-height: 1.4;
  }
  .row {
    display: grid;
    grid-template-columns: 11ch 8ch 1fr auto;
    gap: 4px 14px;
    align-items: baseline;
    text-decoration: none;
    color: inherit;
  }
  a.row .item { text-decoration: underline; text-decoration-color: var(--rule); text-decoration-thickness: 1px; text-underline-offset: 2px; }
  a.row:hover .item { color: var(--riso); text-decoration-color: var(--riso); }
  li .date { color: var(--soft); white-space: nowrap; }
  li .act { color: var(--riso); }
  li .item { color: var(--ink); font-family: "EB Garamond", serif; font-size: 16px; }
  li .src { color: var(--soft); font-size: 11px; letter-spacing: 0.06em; text-align: right; white-space: nowrap; }
  li.fresh .item { font-style: normal; }

  .foot {
    margin-top: 16px; font-size: 11px; letter-spacing: 0.05em; color: var(--soft);
    display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }

  /* month markers */
  li.month {
    border-bottom: none;
    padding: 18px 0 4px;
    font-size: 11px; letter-spacing: 0.14em; color: var(--soft);
  }
  li.month:first-child { padding-top: 2px; }

  /* terminal cursor */
  .cursor {
    width: 7px; height: 14px; margin-top: 14px; background: var(--riso);
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }

  /* rows print in */
  #entries li { animation: rowin 0.45s ease both; }
  @keyframes rowin { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

  /* compact mode (homepage strip): bare rows only */
  body.compact .head, body.compact .rule, body.compact .foot,
  body.compact li.month, body.compact .cursor { display: none; }
  body.compact .log { padding-top: 6px; padding-bottom: 6px; }

  @media (max-width: 460px) {
    .row { grid-template-columns: 1fr auto; }
    .row .date { grid-column: 1; }
    .row .act { grid-column: 2; text-align: right; }
    .row .item { grid-column: 1 / -1; }
    .row .src { grid-column: 1 / -1; text-align: left; }
  }
  @media (prefers-reduced-motion: reduce) {
    .dot, .cursor, #entries li { animation: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>
  <div class="log">
    <div class="head">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="7" stroke="currentColor" stroke-width="1.4"/><path d="M12 2v20M2 12h20" stroke="currentColor" stroke-width="1.4"/></svg>
      <span class="title">live system log</span>
      <span class="live"><span class="dot"></span><span id="synced">syncing…</span></span>
    </div>
    <div class="rule"></div>
    <ul id="entries"></ul>
    <div class="cursor" aria-hidden="true"></div>
    <div class="foot">
      <span>pulls from are.na + letterboxd</span>
      <span>refreshes daily</span>
    </div>
  </div>

<script>
  // ── DATA ───────────────────────────────────────────────────────────
  // This is the ONLY part that changes for the live version. A GitHub
  // Action will fetch are.na + Letterboxd, write entries.json, and the
  // widget below will load it. Until that file exists, it falls back to
  // the mock rows so the design is visible now.
  const MOCK = [
    { date: "2026-06-23", action: "watched", item: "Film About a Father Who", source: "letterboxd" },
    { date: "2026-06-22", action: "saved",   item: "riso registration marks", source: "are.na" },
    { date: "2026-06-20", action: "watched", item: "Kicking the Clouds",       source: "letterboxd" },
    { date: "2026-06-19", action: "saved",   item: "Interference Archive — ephemera", source: "are.na" },
    { date: "2026-06-17", action: "watched", item: "La Jetée",                 source: "letterboxd" },
    { date: "2026-06-15", action: "saved",   item: "Speckletone, 80lb",        source: "are.na" },
    { date: "2026-06-12", action: "watched", item: "Stalker",                  source: "letterboxd" },
    { date: "2026-06-10", action: "saved",   item: "carried-interest, a diagram", source: "are.na" },
  ];

  const params = new URLSearchParams(location.search);
  const ROW_CAP = parseInt(params.get("rows"), 10) || 0;       // e.g. ?rows=3
  if (params.has("compact")) document.body.classList.add("compact"); // ?compact=1

  const MONTHS = ["january","february","march","april","may","june",
                  "july","august","september","october","november","december"];

  function syncedLabel(d) {
    if (!d || isNaN(d)) return "";
    const startOfDay = x => { const t = new Date(x); t.setHours(0, 0, 0, 0); return t; };
    const diff = Math.round((startOfDay(new Date()) - startOfDay(d)) / 86400000);
    if (diff <= 0) return "synced today";
    if (diff === 1) return "synced yesterday";
    if (diff < 7) return "synced " + diff + " days ago";
    return "synced " + d.toLocaleDateString([], { month: "short", day: "numeric" }).toLowerCase();
  }

  function render(entries, updated) {
    const ul = document.getElementById("entries");
    ul.innerHTML = "";
    const compact = document.body.classList.contains("compact");
    const rows = ROW_CAP ? entries.slice(0, ROW_CAP) : entries;
    const nowYear = String(new Date().getFullYear());
    let lastMonth = "", n = 0;

    rows.forEach(e => {
      const ym = String(e.date).slice(0, 7);                 // YYYY-MM
      if (!compact && ym !== lastMonth) {
        lastMonth = ym;
        const [y, mo] = ym.split("-");
        const m = document.createElement("li");
        m.className = "month";
        m.textContent = MONTHS[parseInt(mo, 10) - 1] + (y !== nowYear ? " " + y : "");
        m.style.animationDelay = (n++ * 40) + "ms";
        ul.appendChild(m);
      }
      const li = document.createElement("li");
      li.style.animationDelay = (n++ * 40) + "ms";
      const inner =
        `<span class="date">${e.date}</span>` +
        `<span class="act">${e.action}</span>` +
        `<span class="item">${e.item}</span>` +
        `<span class="src">${e.source}</span>`;
      li.innerHTML = e.url
        ? `<a class="row" href="${e.url}" target="_blank" rel="noopener">${inner}</a>`
        : `<span class="row">${inner}</span>`;
      ul.appendChild(li);
    });

    const synced = document.getElementById("synced");
    if (synced) synced.textContent = updated
      ? syncedLabel(updated)
      : "synced " + new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    postHeight();
  }

  // Try the live feed; fall back to mock for the preview.
  fetch("./entries.json")
    .then(r => { if (!r.ok) throw new Error("no feed yet"); return r.json(); })
    .then(data => {
      const entries = Array.isArray(data) ? data
        : (data && Array.isArray(data.entries) ? data.entries : MOCK);
      const updated = (data && data.updated) ? new Date(data.updated) : null;
      render(entries, updated);
    })
    .catch(() => render(MOCK, null));

  // ── auto-resize: report content height to the Framer parent ─────────
  function postHeight() {
    const el = document.querySelector(".log");
    if (!el || !window.parent) return;
    const h = Math.ceil(el.getBoundingClientRect().height) + 2;
    window.parent.postMessage({ type: "live-system-log-height", height: h }, "*");
  }
  if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
  window.addEventListener("resize", postHeight);
  window.addEventListener("load", postHeight);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(postHeight);
</script>
</body>
</html>
