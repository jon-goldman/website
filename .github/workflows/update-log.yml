name: update live system log

on:
  schedule:
    - cron: "0 11 * * *"   # daily ~7am ET (11:00 UTC); GitHub may delay a bit
  workflow_dispatch:        # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write

# never let two runs push at once
concurrency:
  group: live-system-log
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: build entries.json
        working-directory: system-log
        run: node update-log.mjs
      - name: commit and push if changed
        working-directory: system-log
        run: |
          git config user.name "log-bot"
          git config user.email "actions@users.noreply.github.com"
          git add entries.json
          if git diff --staged --quiet; then
            echo "no changes — nothing to commit"
            exit 0
          fi
          git commit -m "update live system log"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected; syncing remote then retrying (attempt $attempt)"
            git pull --rebase --autostash origin main || git rebase --abort
          done
          echo "could not push after 5 attempts"
          exit 1
