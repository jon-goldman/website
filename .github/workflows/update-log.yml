name: update live system log

on:
  schedule:
    - cron: "0 11 * * *"   # daily ~7am ET (11:00 UTC); GitHub may delay a bit
  workflow_dispatch:        # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: build entries.json
        working-directory: system-log
        run: node update-log.mjs
      - name: commit if changed
        working-directory: system-log
        run: |
          git config user.name "log-bot"
          git config user.email "actions@users.noreply.github.com"
          git add entries.json
          git diff --staged --quiet || git commit -m "update live system log"
          git push
